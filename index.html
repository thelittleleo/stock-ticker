<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Ticker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0f;
    --surface:   #16181c;
    --border:    #2a2d35;
    --muted:     #555b6e;
    --text:      #e2e8f0;
    --subtext:   #94a3b8;
    --green:     #22c55e;
    --red:       #ef4444;
    --green-dim: #14532d;
    --red-dim:   #7f1d1d;
    --accent:    #3b82f6;
    --flash-up:  rgba(34,197,94,0.18);
    --flash-dn:  rgba(239,68,68,0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── ticker bar ── */
  #ticker-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 36px;
    display: flex;
    align-items: center;
  }
  #ticker-track {
    display: flex;
    gap: 48px;
    white-space: nowrap;
    animation: scroll-left 30s linear infinite;
    padding: 0 24px;
  }
  #ticker-bar:hover #ticker-track { animation-play-state: paused; }
  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item { display: inline-flex; align-items: center; gap: 8px; }
  .ticker-sym  { color: var(--subtext); font-size: 12px; }
  .ticker-px   { font-weight: bold; }
  .ticker-chg  { font-size: 12px; }

  /* ── header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 0;
  }
  #header h1 { font-size: 18px; letter-spacing: 2px; color: var(--accent); }
  #status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--subtext);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #status-dot.connected    { background: var(--green); }
  #status-dot.reconnecting { background: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .3; }
  }

  /* ── card grid ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .card:hover   { border-color: var(--accent); transform: translateY(-2px); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .card.flash-up { animation: flash-up .45s ease-out; }
  .card.flash-dn { animation: flash-dn .45s ease-out; }
  @keyframes flash-up {
    0%   { background: var(--flash-up); }
    100% { background: var(--surface); }
  }
  @keyframes flash-dn {
    0%   { background: var(--flash-dn); }
    100% { background: var(--surface); }
  }

  .card-header  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .card-sym     { font-size: 15px; font-weight: bold; letter-spacing: 1px; }
  .card-vol     { font-size: 10px; color: var(--muted); }
  .card-price   { font-size: 22px; font-weight: bold; letter-spacing: .5px; margin-bottom: 4px; }
  .card-change  { font-size: 12px; margin-bottom: 10px; }
  .card-change .abs  { margin-right: 8px; }
  .up { color: var(--green); }
  .dn { color: var(--red); }
  .flat { color: var(--muted); }

  .card canvas  { display: block; width: 100%; }

  /* ── detail chart ── */
  #detail {
    margin: 0 24px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    display: none;
  }
  #detail.visible { display: block; }
  #detail-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
  }
  #detail-sym   { font-size: 22px; font-weight: bold; letter-spacing: 2px; }
  #detail-price { font-size: 30px; font-weight: bold; }
  #detail-change { font-size: 14px; }
  #detail-canvas { display: block; width: 100%; border-radius: 4px; }
</style>
</head>
<body>

<div id="ticker-bar"><div id="ticker-track"></div></div>

<div id="header">
  <h1>LIVE MARKET</h1>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-label">Connecting…</span>
  </div>
</div>

<div id="grid"></div>

<div id="detail">
  <div id="detail-header">
    <span id="detail-sym"></span>
    <span id="detail-price"></span>
    <span id="detail-change"></span>
  </div>
  <canvas id="detail-canvas" height="200"></canvas>
</div>

<script>
const RAILWAY_DOMAIN = 'web-production-479f7.up.railway.app';  // ← fill in after deploy
const WS_URL = (() => {
  const local = window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1';
  return local
    ? 'ws://localhost:8765'
    : `wss://${RAILWAY_DOMAIN}`;
})();
const RECONNECT_MS = 3000;
const SPARKLINE_H  = 48;

// state
const history  = {};   // sym -> [{price, change, change_pct, timestamp, volume}]
const cards    = {};   // sym -> DOM element
const tickerEl = {};   // sym -> ticker-item element
let   selected = null;
let   ws       = null;

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  setStatus('reconnecting', 'Connecting…');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => setStatus('connected', 'Connected');

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'snapshot') handleSnapshot(msg.data);
    else if (msg.type === 'tick') handleTick(msg.data);
  };

  ws.onclose = () => {
    setStatus('reconnecting', 'Reconnecting…');
    setTimeout(connect, RECONNECT_MS);
  };

  ws.onerror = () => ws.close();
}

function setStatus(cls, label) {
  const dot = document.getElementById('status-dot');
  dot.className = cls;
  document.getElementById('status-label').textContent = label;
}

// ── Snapshot ──────────────────────────────────────────────────────────────────
function handleSnapshot(data) {
  for (const [sym, ticks] of Object.entries(data)) {
    history[sym] = ticks;
    if (!cards[sym]) buildCard(sym);
    const latest = ticks[ticks.length - 1];
    if (latest) refreshCard(sym, latest, false);
  }
  rebuildTickerBar();
}

// ── Tick ──────────────────────────────────────────────────────────────────────
function handleTick(tick) {
  const { ticker: sym } = tick;
  if (!history[sym]) history[sym] = [];
  history[sym].push(tick);
  if (history[sym].length > 60) history[sym].shift();

  if (!cards[sym]) buildCard(sym);
  refreshCard(sym, tick, true);
  updateTickerItem(sym, tick);
  if (selected === sym) drawDetail(sym);
}

// ── Card ──────────────────────────────────────────────────────────────────────
function buildCard(sym) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.sym = sym;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-sym">${sym}</span>
      <span class="card-vol"></span>
    </div>
    <div class="card-price">—</div>
    <div class="card-change"><span class="abs">—</span><span class="pct"></span></div>
    <canvas height="${SPARKLINE_H}"></canvas>
  `;
  card.addEventListener('click', () => selectSymbol(sym));
  document.getElementById('grid').appendChild(card);
  cards[sym] = card;
}

function refreshCard(sym, tick, flash) {
  const card = cards[sym];
  if (!card) return;

  const dir = tick.change > 0 ? 'up' : tick.change < 0 ? 'dn' : 'flat';
  const arrow = tick.change > 0 ? '▲' : tick.change < 0 ? '▼' : '●';

  card.querySelector('.card-price').textContent = fmt(tick.price);
  const absEl = card.querySelector('.card-change .abs');
  const pctEl = card.querySelector('.card-change .pct');
  absEl.textContent = `${arrow} ${fmtChange(tick.change)}`;
  absEl.className = `abs ${dir}`;
  pctEl.textContent = `(${fmtPct(tick.change_pct)}%)`;
  pctEl.className = dir;
  card.querySelector('.card-vol').textContent = fmtVol(tick.volume);

  drawSparkline(card.querySelector('canvas'), history[sym] || []);

  if (flash) {
    card.classList.remove('flash-up', 'flash-dn');
    void card.offsetWidth; // reflow
    card.classList.add(tick.change >= 0 ? 'flash-up' : 'flash-dn');
  }
}

// ── Ticker bar ────────────────────────────────────────────────────────────────
function rebuildTickerBar() {
  const track = document.getElementById('ticker-track');
  track.innerHTML = '';
  tickerEl.clear && tickerEl.clear();
  for (const sym of Object.keys(history)) {
    const item = buildTickerItem(sym);
    track.appendChild(item);
    tickerEl[sym] = item;
  }
  // Duplicate for seamless loop
  for (const sym of Object.keys(history)) {
    track.appendChild(buildTickerItem(sym, true));
  }
}

function buildTickerItem(sym, clone = false) {
  const el = document.createElement('div');
  el.className = 'ticker-item';
  el.innerHTML = `<span class="ticker-sym">${sym}</span><span class="ticker-px">—</span><span class="ticker-chg">—</span>`;
  if (!clone) tickerEl[sym] = el;
  return el;
}

function updateTickerItem(sym, tick) {
  const el = tickerEl[sym];
  if (!el) return;
  const dir = tick.change >= 0 ? 'up' : 'dn';
  el.querySelector('.ticker-px').textContent = fmt(tick.price);
  const chg = el.querySelector('.ticker-chg');
  chg.textContent = `${fmtPct(tick.change_pct)}%`;
  chg.className = `ticker-chg ${dir}`;
}

// ── Detail chart ──────────────────────────────────────────────────────────────
function selectSymbol(sym) {
  if (selected && cards[selected]) cards[selected].classList.remove('selected');
  selected = sym;
  cards[sym].classList.add('selected');

  const detail = document.getElementById('detail');
  detail.classList.add('visible');
  document.getElementById('detail-sym').textContent = sym;
  drawDetail(sym);
}

function drawDetail(sym) {
  const ticks = history[sym] || [];
  const latest = ticks[ticks.length - 1];
  if (!latest) return;

  const dir = latest.change >= 0 ? 'up' : 'dn';
  const arrow = latest.change >= 0 ? '▲' : '▼';
  document.getElementById('detail-price').textContent = fmt(latest.price);
  document.getElementById('detail-price').className = dir;
  const chgEl = document.getElementById('detail-change');
  chgEl.textContent = `${arrow} ${fmtChange(latest.change)}  (${fmtPct(latest.change_pct)}%)`;
  chgEl.className = dir;

  const canvas = document.getElementById('detail-canvas');
  canvas.width  = canvas.offsetWidth || 800;
  canvas.height = 200;
  const prices = ticks.map(t => t.price);
  drawChart(canvas, prices, latest.change >= 0);
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
function drawSparkline(canvas, ticks) {
  canvas.width = canvas.offsetWidth || 180;
  const prices = ticks.map(t => t.price);
  const latest = ticks[ticks.length - 1];
  drawChart(canvas, prices, !latest || latest.change >= 0);
}

function drawChart(canvas, prices, isUp) {
  const ctx  = canvas.getContext('2d');
  const W    = canvas.width;
  const H    = canvas.height;
  const pad  = 4;

  ctx.clearRect(0, 0, W, H);
  if (prices.length < 2) return;

  const min  = Math.min(...prices);
  const max  = Math.max(...prices);
  const span = max - min || 1;
  const color = isUp ? '#22c55e' : '#ef4444';
  const colorDim = isUp ? '#14532d' : '#7f1d1d';

  const xStep = (W - pad * 2) / (prices.length - 1);
  const yOf   = p => H - pad - ((p - min) / span) * (H - pad * 2);

  // Fill gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, color + '55');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  ctx.moveTo(pad, yOf(prices[0]));
  for (let i = 1; i < prices.length; i++) {
    ctx.lineTo(pad + i * xStep, yOf(prices[i]));
  }
  const lastX = pad + (prices.length - 1) * xStep;
  ctx.lineTo(lastX, H);
  ctx.lineTo(pad, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(pad, yOf(prices[0]));
  for (let i = 1; i < prices.length; i++) {
    ctx.lineTo(pad + i * xStep, yOf(prices[i]));
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = H > 80 ? 2 : 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dot at latest
  if (prices.length > 0) {
    const lx = pad + (prices.length - 1) * xStep;
    const ly = yOf(prices[prices.length - 1]);
    ctx.beginPath();
    ctx.arc(lx, ly, H > 80 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }
}

// ── Formatting ────────────────────────────────────────────────────────────────
const fmt      = n => n == null ? '—' : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtChange = n => n == null ? '—' : (n >= 0 ? '+' : '') + fmt(n);
const fmtPct   = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2);
const fmtVol   = n => !n ? '' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);

// ── Init ──────────────────────────────────────────────────────────────────────
connect();

// Redraw sparklines + detail chart on resize
window.addEventListener('resize', () => {
  for (const sym of Object.keys(cards)) {
    const card = cards[sym];
    const ticks = history[sym] || [];
    drawSparkline(card.querySelector('canvas'), ticks);
  }
  if (selected) drawDetail(selected);
});
</script>
</body>
</html>
